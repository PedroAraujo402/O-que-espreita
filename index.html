<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>█ O QUE ESPREITA █</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Creepster&display=swap" rel="stylesheet">
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- Intro Screen -->
  <div id="intro-screen">
    <div id="intro-title">O QUE ESPREITA</div>
    <div id="intro-sub">
      UM JOGO DE TERROR TEXTUAL<br>
      ── ─ ── ─ ── ─ ──<br>
      VOCÊ NÃO ESTÁ SOZINHO
    </div>
    <button id="start-btn">[ INICIAR ]</button>
  </div>

  <div id="game-container">
    <div id="header">
      <div id="title">█ O QUE ESPREITA █</div>
      <div id="subtitle">SISTEMA DE EXPLORAÇÃO TEXTUAL v0.9.1 // INSTÂNCIA CORROMPIDA</div>
    </div>

    <div id="proximity-section">
      <span id="proximity-label">PRESENÇA DETECTADA</span>
      <div id="proximity-bar-wrap">
        <div id="proximity-fill"></div>
      </div>
      <span id="proximity-value">0%</span>
    </div>

    <div id="output">
      <div id="monster-layer"></div>
      <div id="messages-wrap"></div>
    </div>

    <div id="input-section">
      <span id="prompt-prefix">você@escuridão:~$</span>
      <input type="text" id="player-input" placeholder="O que você faz?" autocomplete="off" spellcheck="false" />
      <button id="send-btn">AGIR</button>
    </div>

    <div id="status-bar">
      <span id="session-id">SESSÃO: ████-████-████</span>
      <span id="thinking-indicator">■ PROCESSANDO</span>
      <span id="coord-display">COORDENADAS: DESCONHECIDAS</span>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
